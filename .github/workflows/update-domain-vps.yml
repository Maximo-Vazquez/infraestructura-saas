name: Actualizar Dominio en VPS (Ingress + Deploy env)

on:
  workflow_dispatch:
    inputs:
      base_domain:
        description: "Dominio principal (sin www). Ej: indutienda.com"
        required: true
        default: "indutienda.com"
      namespace:
        description: "Namespace de las apps"
        required: true
        default: "default"
      deployments_csv:
        description: "Deployments a actualizar (CSV). Ej: indumentaria-deployment,saas-deployment"
        required: true
        default: "indumentaria-deployment,saas-deployment"
      restart:
        description: "Reiniciar deployments al final"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Copiar configuraciones al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "ingress/**"
          target: "/home/${{ secrets.VPS_USER }}/deployments/ingress-global"

      - name: Aplicar Ingress y actualizar envs
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin"

            # kubectl wrapper si el VPS usa k3s
            if ! command -v kubectl >/dev/null 2>&1 && command -v k3s >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              cat >"$HOME/.local/bin/kubectl" <<'EOF'
            #!/usr/bin/env bash
            exec k3s kubectl "$@"
            EOF
              chmod +x "$HOME/.local/bin/kubectl"
              export PATH="$HOME/.local/bin:$PATH"
            fi

            if [ -z "${KUBECONFIG:-}" ]; then
              if [ -f /etc/rancher/k3s/k3s.yaml ]; then
                export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
              else
                export KUBECONFIG="$HOME/.kube/config"
              fi
            fi

            BASE_DOMAIN="${{ inputs.base_domain }}"
            NS="${{ inputs.namespace }}"
            DEPLOYMENTS_CSV="${{ inputs.deployments_csv }}"
            RESTART="${{ inputs.restart }}"

            AUTH_DOMAIN="https://auth.${BASE_DOMAIN}"
            COOKIE_DOMAIN=".${BASE_DOMAIN}"
            MP_BASE_URL="https://pago.${BASE_DOMAIN}"
            MP_WEBHOOK_URL="https://pago.${BASE_DOMAIN}/webhook/mercadopago/"
            MP_REDIRECT_URI="https://pago.${BASE_DOMAIN}/oauth/mp/callback"

            echo "Aplicando Ingress (apps) desde repo..."
            cd "/home/${{ secrets.VPS_USER }}/deployments/ingress-global"
            kubectl -n "$NS" apply -f ingress/global-ingress-apps.yaml

            echo "Actualizando env vars en deployments ($DEPLOYMENTS_CSV) en ns=$NS..."
            IFS=',' read -r -a deploys <<<"$DEPLOYMENTS_CSV"
            for d in "${deploys[@]}"; do
              dep="$(echo "$d" | xargs)"
              [ -n "$dep" ] || continue

              if ! kubectl -n "$NS" get deployment "$dep" >/dev/null 2>&1; then
                echo "Deployment '$dep' no existe en ns=$NS. Se omite."
                continue
              fi

              kubectl -n "$NS" set env deployment/"$dep" \
                AUTH_DOMAIN="$AUTH_DOMAIN" \
                COOKIE_DOMAIN="$COOKIE_DOMAIN" \
                MERCADOPAGO_BASE_URL="$MP_BASE_URL" \
                MERCADOPAGO_WEBHOOK_URL="$MP_WEBHOOK_URL" \
                MP_REDIRECT_URI="$MP_REDIRECT_URI" \
                --containers="*" >/dev/null

              if [ "$RESTART" = "true" ]; then
                kubectl -n "$NS" rollout restart deployment/"$dep" >/dev/null
              fi
            done

            echo "OK."

