name: Configurar Secretos BD en VPS (Kubernetes)

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Namespace donde vive la app (default)"
        required: true
        default: "default"
      secret_name:
        description: "Nombre del Secret a crear/actualizar"
        required: true
        default: "db-credentials-indumentaria"
      db_host:
        description: "DB host (opcional). Si se deja vacio, se detecta el InternalIP del nodo."
        required: false
        default: ""
      db_port:
        description: "DB port"
        required: true
        default: "5432"

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Secret de DB en el VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin"

            # kubectl wrapper si el VPS usa k3s
            if ! command -v kubectl >/dev/null 2>&1 && command -v k3s >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              cat >"$HOME/.local/bin/kubectl" <<'EOF'
            #!/usr/bin/env bash
            exec k3s kubectl "$@"
            EOF
              chmod +x "$HOME/.local/bin/kubectl"
              export PATH="$HOME/.local/bin:$PATH"
            fi

            if [ -z "${KUBECONFIG:-}" ]; then
              if [ -f /etc/rancher/k3s/k3s.yaml ]; then
                export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
              else
                export KUBECONFIG="$HOME/.kube/config"
              fi
            fi

            NS="${{ inputs.namespace }}"
            SECRET_NAME="${{ inputs.secret_name }}"

            DB_PORT="${{ inputs.db_port }}"
            DB_HOST_INPUT="${{ inputs.db_host }}"

            if [ -n "$DB_HOST_INPUT" ]; then
              DB_HOST="$DB_HOST_INPUT"
            else
              # 1-nodo: tomar InternalIP del primer nodo. Fallback: hostname -I.
              DB_HOST="$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || true)"
              if [ -z "$DB_HOST" ]; then
                DB_HOST="$(hostname -I | awk '{print $1}')"
              fi
            fi

            if [ -z "$DB_HOST" ]; then
              echo "Error: no se pudo determinar DB_HOST. Pasalo por input db_host."
              exit 1
            fi

            # Credenciales: se reutilizan los mismos secrets del repo.
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"

            if [ -z "$POSTGRES_PASSWORD" ]; then
              echo "Error: falta configurar el secret POSTGRES_PASSWORD en GitHub."
              exit 1
            fi
            if [ -z "$POSTGRES_USER" ]; then
              POSTGRES_USER="postgres"
            fi

            echo "Aplicando Secret '$SECRET_NAME' en namespace '$NS' con host '$DB_HOST' y port '$DB_PORT'..."

            # Nota: se crean ambos keys: 'host' (compatibilidad) y 'BD_VPS_HOST' (nuevo).
            kubectl -n "$NS" create secret generic "$SECRET_NAME" \
              --from-literal=host="$DB_HOST" \
              --from-literal=BD_VPS_HOST="$DB_HOST" \
              --from-literal=port="$DB_PORT" \
              --from-literal=user="$POSTGRES_USER" \
              --from-literal=password="$POSTGRES_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "OK."

