name: Configurar Secretos BD en VPS (Kubernetes)

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Namespace donde vive la app (default)"
        required: true
        default: "default"
      secret_name:
        description: "Nombre(s) del Secret a crear/actualizar (CSV)"
        required: true
        default: "db-credentials-indumentaria,db-credentials-saas"
      db_host:
        description: "DB host (opcional). Si se deja vacio, se detecta el InternalIP del nodo."
        required: false
        default: ""
      db_port:
        description: "DB port"
        required: true
        default: "5432"

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Secret de DB en el VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin"

            # kubectl wrapper si el VPS usa k3s
            if ! command -v kubectl >/dev/null 2>&1 && command -v k3s >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              cat >"$HOME/.local/bin/kubectl" <<'EOF'
            #!/usr/bin/env bash
            exec k3s kubectl "$@"
            EOF
              chmod +x "$HOME/.local/bin/kubectl"
              export PATH="$HOME/.local/bin:$PATH"
            fi

            if [ -z "${KUBECONFIG:-}" ]; then
              if [ -f /etc/rancher/k3s/k3s.yaml ]; then
                export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
              else
                export KUBECONFIG="$HOME/.kube/config"
              fi
            fi

            NS="${{ inputs.namespace }}"
            SECRET_NAMES_CSV="${{ inputs.secret_name }}"

            DB_PORT="${{ inputs.db_port }}"
            DB_HOST_INPUT="${{ inputs.db_host }}"
            DB_HOST_SECRET="${{ secrets.DB_VPS_HOST }}"

            if [ -n "$DB_HOST_INPUT" ]; then
              DB_HOST="$DB_HOST_INPUT"
            elif [ -n "$DB_HOST_SECRET" ]; then
              DB_HOST="$DB_HOST_SECRET"
            else
              # Fallback si no configuraste el GitHub Secret DB_VPS_HOST:
              # 1-nodo: tomar InternalIP del primer nodo. Fallback: hostname -I.
              DB_HOST="$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || true)"
              if [ -z "$DB_HOST" ]; then
                DB_HOST="$(hostname -I | awk '{print $1}')"
              fi
            fi

            if [ -z "$DB_HOST" ]; then
              echo "Error: no se pudo determinar DB_HOST. Configura el GitHub Secret DB_VPS_HOST o pasalo por input db_host."
              exit 1
            fi

            # Credenciales: se reutilizan los mismos secrets del repo.
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"

            if [ -z "$POSTGRES_PASSWORD" ]; then
              echo "Error: falta configurar el secret POSTGRES_PASSWORD en GitHub."
              exit 1
            fi
            if [ -z "$POSTGRES_USER" ]; then
              POSTGRES_USER="postgres"
            fi

            IFS=',' read -r -a SECRET_NAMES <<< "$SECRET_NAMES_CSV"
            if [ "${#SECRET_NAMES[@]}" -eq 0 ]; then
              echo "Error: no se recibieron nombres de Secret."
              exit 1
            fi

            for RAW_NAME in "${SECRET_NAMES[@]}"; do
              SECRET_NAME="$(echo "$RAW_NAME" | xargs)"
              if [ -z "$SECRET_NAME" ]; then
                continue
              fi

              current_host_b64="$(kubectl -n "$NS" get secret "$SECRET_NAME" -o jsonpath='{.data.host}' 2>/dev/null || true)"
              if [ -n "$current_host_b64" ]; then
                current_host="$(echo "$current_host_b64" | base64 -d 2>/dev/null || true)"
                echo "Secret actual '$SECRET_NAME' host=$current_host"
              else
                echo "Secret '$SECRET_NAME' no existe aun en namespace '$NS'."
              fi

              echo "Aplicando Secret '$SECRET_NAME' en namespace '$NS' con host '$DB_HOST' y port '$DB_PORT'..."

              # Nota: se crean ambos keys: 'host' (compatibilidad) y 'BD_VPS_HOST' (nuevo).
              kubectl -n "$NS" create secret generic "$SECRET_NAME" \
                --from-literal=host="$DB_HOST" \
                --from-literal=BD_VPS_HOST="$DB_HOST" \
                --from-literal=port="$DB_PORT" \
                --from-literal=user="$POSTGRES_USER" \
                --from-literal=password="$POSTGRES_PASSWORD" \
                --dry-run=client -o yaml | kubectl apply -f -

              new_host="$(kubectl -n "$NS" get secret "$SECRET_NAME" -o jsonpath='{.data.host}' | base64 -d)"
              echo "Secret actualizado '$SECRET_NAME' host=$new_host"
              if [ "$new_host" != "$DB_HOST" ]; then
                echo "Error: el host del Secret no quedo como se esperaba."
                exit 1
              fi
            done

            echo "OK."
