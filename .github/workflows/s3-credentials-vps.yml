name: Configurar Credenciales S3 en VPS (MinIO)

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Namespace donde vive MinIO"
        required: true
        default: "default"
      restart_minio:
        description: "Reiniciar deployment/minio para tomar secretos nuevos"
        required: true
        default: true
        type: boolean

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Actualizar secretos S3 en el VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_SAAS_ACCESS_KEY: ${{ secrets.MINIO_SAAS_ACCESS_KEY }}
          MINIO_SAAS_SECRET_KEY: ${{ secrets.MINIO_SAAS_SECRET_KEY }}
          MINIO_INDUMENTARIA_ACCESS_KEY: ${{ secrets.MINIO_INDUMENTARIA_ACCESS_KEY }}
          MINIO_INDUMENTARIA_SECRET_KEY: ${{ secrets.MINIO_INDUMENTARIA_SECRET_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,MINIO_SAAS_ACCESS_KEY,MINIO_SAAS_SECRET_KEY,MINIO_INDUMENTARIA_ACCESS_KEY,MINIO_INDUMENTARIA_SECRET_KEY
          script: |
            set -euo pipefail

            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin"

            # kubectl wrapper si el VPS usa k3s
            if ! command -v kubectl >/dev/null 2>&1 && command -v k3s >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              cat >"$HOME/.local/bin/kubectl" <<'EOF'
            #!/usr/bin/env bash
            exec k3s kubectl "$@"
            EOF
              chmod +x "$HOME/.local/bin/kubectl"
              export PATH="$HOME/.local/bin:$PATH"
            fi

            if [ -z "${KUBECONFIG:-}" ]; then
              if [ -f /etc/rancher/k3s/k3s.yaml ]; then
                export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
              else
                export KUBECONFIG="$HOME/.kube/config"
              fi
            fi

            NS="${{ inputs.namespace }}"
            RESTART_MINIO="${{ inputs.restart_minio }}"
            BASE_DIR="/home/${{ secrets.VPS_USER }}/deployments/ingress-global"
            cd "$BASE_DIR"

            required_minio_vars=(
              MINIO_ROOT_USER
              MINIO_ROOT_PASSWORD
              MINIO_SAAS_ACCESS_KEY
              MINIO_SAAS_SECRET_KEY
              MINIO_INDUMENTARIA_ACCESS_KEY
              MINIO_INDUMENTARIA_SECRET_KEY
            )
            for var_name in "${required_minio_vars[@]}"; do
              if [ -z "${!var_name:-}" ]; then
                echo "Error: falta GitHub Secret obligatorio '$var_name'."
                exit 1
              fi
            done

            escape_sed() {
              printf '%s' "$1" | sed -e 's/[\/&]/\\&/g'
            }

            echo "Aplicando secret minio-root-credentials..."
            sed \
              -e "s/REPLACE_WITH_MINIO_ROOT_USER/$(escape_sed "$MINIO_ROOT_USER")/g" \
              -e "s/REPLACE_WITH_MINIO_ROOT_PASSWORD/$(escape_sed "$MINIO_ROOT_PASSWORD")/g" \
              secrets-templates/minio-root-credentials.yaml | kubectl -n "$NS" apply -f -

            echo "Aplicando secret minio-app-credentials..."
            sed \
              -e "s/REPLACE_WITH_MINIO_SAAS_ACCESS_KEY/$(escape_sed "$MINIO_SAAS_ACCESS_KEY")/g" \
              -e "s/REPLACE_WITH_MINIO_SAAS_SECRET_KEY/$(escape_sed "$MINIO_SAAS_SECRET_KEY")/g" \
              -e "s/REPLACE_WITH_MINIO_INDUMENTARIA_ACCESS_KEY/$(escape_sed "$MINIO_INDUMENTARIA_ACCESS_KEY")/g" \
              -e "s/REPLACE_WITH_MINIO_INDUMENTARIA_SECRET_KEY/$(escape_sed "$MINIO_INDUMENTARIA_SECRET_KEY")/g" \
              secrets-templates/minio-app-credentials.yaml | kubectl -n "$NS" apply -f -

            if [ "$RESTART_MINIO" = "true" ]; then
              echo "Reiniciando deployment/minio..."
              kubectl -n "$NS" rollout restart deployment/minio
            fi

            kubectl -n "$NS" rollout status deployment/minio --timeout=180s

            echo "Re-ejecutando bootstrap de MinIO..."
            kubectl -n "$NS" delete job minio-bootstrap --ignore-not-found
            kubectl -n "$NS" apply -f ingress/minio/bootstrap-job.yaml
            kubectl -n "$NS" wait --for=condition=complete --timeout=180s job/minio-bootstrap
            kubectl -n "$NS" logs job/minio-bootstrap --tail=80

            echo "Credenciales S3 actualizadas correctamente."
