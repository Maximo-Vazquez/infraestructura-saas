name: Gestion Postgres VPS

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Accion a ejecutar"
        required: true
        default: "backup"
        type: choice
        options:
          - backup
          - start
          - restart
          - status
          - stop
      data_dir:
        description: "Ruta de datos en el VPS (opcional)"
        required: false
      backup_dir:
        description: "Ruta de backups en el VPS (opcional)"
        required: false
      port:
        description: "Puerto a exponer en el VPS (opcional, por defecto 5432)"
        required: false

jobs:
  postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Subir script postgres al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "scripts/postgres-vps.sh"
          target: "/tmp"

      - name: Ejecutar accion solicitada
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin"

            install_dir="/home/${{ secrets.VPS_USER }}/deployments/postgres"

            tmp_script="/tmp/scripts/postgres-vps.sh"
            [ -f "$tmp_script" ] || tmp_script="/tmp/postgres-vps.sh"

            mkdir -p "$install_dir"
            mv -f "$tmp_script" "$install_dir/postgres-vps.sh"
            chmod +x "$install_dir/postgres-vps.sh"

            # Misma credencial de BD que el NAS (secrets compartidos)
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"

            if [ -n "${{ inputs.data_dir }}" ]; then export PG_DATA_DIR="${{ inputs.data_dir }}"; fi
            if [ -n "${{ inputs.backup_dir }}" ]; then export PG_BACKUP_DIR="${{ inputs.backup_dir }}"; fi
            if [ -n "${{ inputs.port }}" ]; then export PG_PORT="${{ inputs.port }}"; fi

            "$install_dir/postgres-vps.sh" "${{ inputs.task }}"

