name: Despliegue Infra Completa VPS (Controlador + Mantenimiento + Ingress)

on:
  workflow_dispatch:
    inputs:
      backend_mode:
        description: "Selecciona backend: mantenimiento (landing) o apps (indumentaria/saas)"
        required: true
        default: "mantenimiento"
        type: choice
        options:
          - mantenimiento
          - apps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Copiar configuraciones al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "ingress/**,scripts/**,secrets-templates/**"
          target: "/home/${{ secrets.VPS_USER }}/deployments/ingress-global"

      - name: Desplegar flujo completo en el VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_SAAS_ACCESS_KEY: ${{ secrets.MINIO_SAAS_ACCESS_KEY }}
          MINIO_SAAS_SECRET_KEY: ${{ secrets.MINIO_SAAS_SECRET_KEY }}
          MINIO_INDUMENTARIA_ACCESS_KEY: ${{ secrets.MINIO_INDUMENTARIA_ACCESS_KEY }}
          MINIO_INDUMENTARIA_SECRET_KEY: ${{ secrets.MINIO_INDUMENTARIA_SECRET_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: CLOUDFLARE_API_TOKEN,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,MINIO_SAAS_ACCESS_KEY,MINIO_SAAS_SECRET_KEY,MINIO_INDUMENTARIA_ACCESS_KEY,MINIO_INDUMENTARIA_SECRET_KEY
          script: |
            set -euo pipefail
            echo "Desplegando infraestructura completa en VPS..."

            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin"

            # Si el VPS usa k3s y no tiene kubectl, crea un wrapper local.
            if ! command -v kubectl >/dev/null 2>&1 && command -v k3s >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              cat >"$HOME/.local/bin/kubectl" <<'EOF'
            #!/usr/bin/env bash
            exec k3s kubectl "$@"
            EOF
              chmod +x "$HOME/.local/bin/kubectl"
              export PATH="$HOME/.local/bin:$PATH"
            fi

            # Kubeconfig: k3s suele usar /etc/rancher/k3s/k3s.yaml (si existe).
            if [ -z "${KUBECONFIG:-}" ]; then
              if [ -f /etc/rancher/k3s/k3s.yaml ]; then
                export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
              else
                export KUBECONFIG="$HOME/.kube/config"
              fi
            fi

            BASE_DIR="/home/${{ secrets.VPS_USER }}/deployments/ingress-global"
            cd "$BASE_DIR"

            # 0) Instalacion de dependencias (Cert-Manager)
            echo "--- Verificando Cert-Manager ---"
            chmod +x scripts/install-cert-manager.sh
            bash scripts/install-cert-manager.sh

            # 0.1) Configurar Secreto Cloudflare (Si existe el token)
            if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
              echo "--- Configurando Token de Cloudflare ---"
              sed "s/REPLACE_WITH_YOUR_CLOUDFLARE_API_TOKEN/$CLOUDFLARE_API_TOKEN/g" secrets-templates/cloudflare-api-token.yaml | kubectl apply -f -
            else
              echo "ADVERTENCIA: CLOUDFLARE_API_TOKEN no detectado en GitHub Secrets."
              echo "El issuer de Lets Encrypt fallara al intentar validar dominios Wildcard."
            fi

            # 0.2) Configurar secretos de MinIO (obligatorios para S3 de media)
            required_minio_vars=(
              MINIO_ROOT_USER
              MINIO_ROOT_PASSWORD
              MINIO_SAAS_ACCESS_KEY
              MINIO_SAAS_SECRET_KEY
              MINIO_INDUMENTARIA_ACCESS_KEY
              MINIO_INDUMENTARIA_SECRET_KEY
            )
            for var_name in "${required_minio_vars[@]}"; do
              if [ -z "${!var_name:-}" ]; then
                echo "Error: falta GitHub Secret obligatorio '$var_name' para desplegar MinIO."
                exit 1
              fi
            done

            escape_sed() {
              printf '%s' "$1" | sed -e 's/[\/&]/\\&/g'
            }

            echo "--- Aplicando secretos de MinIO ---"
            sed \
              -e "s/REPLACE_WITH_MINIO_ROOT_USER/$(escape_sed "$MINIO_ROOT_USER")/g" \
              -e "s/REPLACE_WITH_MINIO_ROOT_PASSWORD/$(escape_sed "$MINIO_ROOT_PASSWORD")/g" \
              secrets-templates/minio-root-credentials.yaml | kubectl apply -f -

            sed \
              -e "s/REPLACE_WITH_MINIO_SAAS_ACCESS_KEY/$(escape_sed "$MINIO_SAAS_ACCESS_KEY")/g" \
              -e "s/REPLACE_WITH_MINIO_SAAS_SECRET_KEY/$(escape_sed "$MINIO_SAAS_SECRET_KEY")/g" \
              -e "s/REPLACE_WITH_MINIO_INDUMENTARIA_ACCESS_KEY/$(escape_sed "$MINIO_INDUMENTARIA_ACCESS_KEY")/g" \
              -e "s/REPLACE_WITH_MINIO_INDUMENTARIA_SECRET_KEY/$(escape_sed "$MINIO_INDUMENTARIA_SECRET_KEY")/g" \
              secrets-templates/minio-app-credentials.yaml | kubectl apply -f -

            # 0.3) En k3s single-node: desactivar Traefik por conflicto de puertos 80/443 con ingress-nginx hostNetwork
            kubectl -n kube-system scale deployment traefik --replicas=0 >/dev/null 2>&1 || true
            kubectl -n kube-system delete service traefik --ignore-not-found >/dev/null 2>&1 || true
            kubectl -n kube-system delete daemonset -l svccontroller.k3s.cattle.io/svcname=traefik --ignore-not-found >/dev/null 2>&1 || true

            # 1) Ingress Controller (hostNetwork directo en 80/443 del VPS)
            kubectl apply -f ingress/ingress-controller-vps.yaml
            kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=420s

            # 1.5) Cluster Issuer (Let's Encrypt - DNS01)
            kubectl apply -f ingress/issuer-letsencrypt-prod.yaml

            # 2) Pagina de mantenimiento (placeholder) siempre disponible
            kubectl apply -k ingress/maintenance

            # 3) Storage S3 local (MinIO) para media
            kubectl apply -k ingress/minio
            kubectl -n default rollout status deployment/minio --timeout=180s

            # Re-ejecuta bootstrap para mantener bucket/policies/users sincronizados
            kubectl -n default delete job minio-bootstrap --ignore-not-found
            kubectl -n default apply -f ingress/minio/bootstrap-job.yaml
            kubectl -n default wait --for=condition=complete --timeout=180s job/minio-bootstrap

            # 4) Seleccionar backend para las reglas del Ingress
            BACKEND_MODE="${{ inputs.backend_mode }}"
            if [ "$BACKEND_MODE" = "apps" ]; then
              INGRESS_FILE="ingress/global-ingress-apps.yaml"
              echo "Usando backends reales (apps). Asegurate de que los Services existan."
            else
              INGRESS_FILE="ingress/global-ingress.yaml"
              echo "Usando pagina de mantenimiento como backend."
            fi

            kubectl apply -f "$INGRESS_FILE"
            kubectl get ingress ingress-principal -o wide
            kubectl get ingress minio-api-ingress -o wide
            kubectl -n ingress-nginx get pods,svc -o wide
            echo "Despliegue finalizado con modo backend: $BACKEND_MODE"
